<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sony WH-X1000MX VII — Night City Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
/* This ensures the image background is completely neutralized */
.img-carousel {
  position: relative; 
  width: 320px; 
  height: 320px;
  overflow: hidden; 
  border-radius: 16px;
  background: transparent; /* Ensures no white box behind the image */
}

..img-carousel img {
  position: absolute;
  top: 50%; /* Move to center */
  left: 50%; /* Move to center */
  transform: translate(-50%, -50%); /* Perfectly center the image */
  
  width: auto; /* Let width scale naturally */
  height: 90%; /* Keep it slightly smaller than the container */
  max-width: 90%;
  
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.6s ease;

  /* THE BLACK-BOX KILLERS */
  mix-blend-mode: screen; /* Makes black pixels transparent */
  
  /* This filter combo forces dark greys to pure black so they disappear */
  filter: brightness(1.2) contrast(1.2) grayscale(0.2) drop-shadow(0 0 20px rgba(160, 80, 255, 0.5));
  
  /* Ensures no stray edges outside a soft circular boundary */
  clip-path: circle(48% at 50% 50%);
}

.img-carousel img.active { 
  opacity: 1; 
}
    body {
      background: #000;
      min-height: 100vh;
      font-family: 'Rajdhani', sans-serif;
      color: #e8d5ff;
      overflow-x: hidden;
    }

    .stars { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 3s infinite; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    .moon {
      position: fixed; top: 40px; right: 60px;
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffde0, #f0e080 40%, #c8a020 100%);
      box-shadow: 0 0 40px 10px rgba(255,220,60,0.25);
      z-index: 1; animation: moonpulse 4s ease-in-out infinite;
    }

    @keyframes moonpulse {
      0%, 100% { box-shadow: 0 0 40px 10px rgba(255,220,60,0.20); }
      50%       { box-shadow: 0 0 60px 20px rgba(255,220,60,0.35); }
    }

    .city-silhouette { position: fixed; bottom: 0; left: 0; width: 100%; height: 200px; z-index: 1; opacity: 0.5; }

    .scan-line {
      position: fixed; width: 100%; height: 2px;
      background: rgba(180,100,255,0.15);
      animation: scan 6s linear infinite;
      z-index: 2; pointer-events: none;
    }

    @keyframes scan {
      0%   { top: -2px; }
      100% { top: 100%; }
    }

    .content {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      padding: 2rem 1.5rem 4rem;
    }

    .brand-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 4px; color: #a060ff;
      text-transform: uppercase; margin-bottom: 0.5rem;
      animation: fadeIn 1s ease forwards;
    }

    .product-title {
      font-size: 36px; font-weight: 700; letter-spacing: 2px;
      text-align: center; color: #fff; line-height: 1.1;
      animation: fadeIn 1.2s ease forwards;
    }

    .product-title span { color: #b060ff; }

    .tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; color: #7040c0; letter-spacing: 2px;
      margin-top: 0.4rem; animation: fadeIn 1.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scene-wrapper {
      margin: 2rem 0 1.5rem; position: relative;
      width: 320px; height: 320px;
      animation: floatScene 5s ease-in-out infinite;
    }

    @keyframes floatScene {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    .scene-glow {
      position: absolute; width: 260px; height: 260px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(140,60,255,0.20) 0%, transparent 70%);
      animation: glowpulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowpulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.7; }
      50%       { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
    }

    .img-carousel {
      position: relative; width: 320px; height: 320px;
      overflow: hidden; border-radius: 16px;
    }

    .img-carousel img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: contain;
      opacity: 0; transition: opacity 0.6s ease;
      filter: drop-shadow(0 0 18px rgba(160,80,255,0.5));
    }

    .img-carousel img.active { opacity: 1; }

    .carousel-dots {
      position: absolute; bottom: 6px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 5;
    }

    .carousel-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(160,80,255,0.35);
      cursor: pointer; transition: background 0.2s;
    }

    .carousel-dot.active { background: #c080ff; }

    .memory-particle {
      position: absolute; width: 3px; height: 3px;
      border-radius: 50%; background: #b060ff;
      animation: drift linear infinite;
      opacity: 0; pointer-events: none;
    }

    @keyframes drift {
      0%   { opacity: 0; transform: translate(0,0) scale(1); }
      20%  { opacity: 1; }
      80%  { opacity: 0.5; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
    }

    .product-glow-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(160,80,255,0.3);
      animation: ringpulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes ringpulse {
      0%   { transform: translate(-50%,-50%) scale(0.9); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
    }

    .quote-block { max-width: 340px; text-align: center; margin-bottom: 2rem; animation: fadeIn 2s ease forwards; }

    .quote-text {
      font-size: 15px; color: #a080d0; font-style: italic;
      line-height: 1.6; font-family: 'Share Tech Mono', monospace;
    }

    .quote-text .highlight { color: #d0a0ff; }

    .stats-row {
      display: flex; gap: 12px; margin-bottom: 2rem;
      width: 100%; max-width: 360px;
      animation: fadeIn 1.8s ease forwards;
    }

    .stat-card {
      flex: 1; border: 1px solid rgba(160,80,255,0.3);
      border-radius: 8px; padding: 10px; text-align: center;
      background: rgba(60,0,120,0.2);
    }

    .stat-val { font-size: 20px; font-weight: 700; color: #d0a0ff; }

    .stat-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: #7040c0; letter-spacing: 1px; margin-top: 2px;
    }

    .btn-row { display: flex; gap: 12px; margin-bottom: 2rem; }

    .btn-primary {
      background: linear-gradient(135deg, #8020d0, #5010a0);
      color: #fff; border: none; padding: 12px 28px;
      border-radius: 4px; font-family: 'Rajdhani', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: 2px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.15s;
    }

    .btn-primary::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: rgba(255,255,255,0.15);
      transform: skewX(-20deg); animation: btnshine 3s infinite;
    }

    @keyframes btnshine {
      0%        { left: -100%; }
      40%, 100% { left: 160%; }
    }

    .btn-primary:hover { transform: scale(1.04); }

    .btn-secondary {
      background: transparent; color: #a060ff;
      border: 1px solid rgba(160,80,255,0.5);
      padding: 12px 22px; border-radius: 4px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px; font-weight: 600; letter-spacing: 2px;
      cursor: pointer; transition: all 0.2s;
    }

    .btn-secondary:hover { background: rgba(160,80,255,0.1); border-color: #a060ff; }

    .color-dots { display: flex; gap: 8px; margin-bottom: 1.5rem; }

    .cdot {
      width: 14px; height: 14px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
    }

    .cdot.active { border-color: #fff; transform: scale(1.2); }

    .emotion-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 2px; color: #b080ff;
      border: 1px solid rgba(160,80,255,0.35);
      border-radius: 2px; padding: 3px 10px; margin-bottom: 1rem;
      animation: badgepulse 2s ease-in-out infinite;
    }

    @keyframes badgepulse {
      0%, 100% { border-color: rgba(160,80,255,0.35); }
      50%       { border-color: rgba(160,80,255,0.80); }
    }

    .data-strip {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: rgba(120,60,200,0.6);
      letter-spacing: 1px; margin-top: 1rem; transition: opacity 0.4s;
    }
  </style>
</head>

<body>

  <div class="scan-line"></div>
  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <svg class="city-silhouette" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,200 L0,130 L30,130 L30,100 L50,100 L50,80 L70,80 L70,100
             L90,100 L90,60 L110,60 L110,40 L120,40 L120,20 L130,20 L130,40
             L140,40 L140,60 L160,60 L160,90 L180,90 L180,70 L200,70 L200,50
             L215,50 L215,30 L225,30 L225,50 L240,50 L240,70 L260,70 L260,100
             L280,100 L280,80 L300,80 L300,110 L320,110 L320,85 L340,85 L340,60
             L355,60 L355,45 L365,45 L365,60 L380,60 L380,85 L400,85 L400,110
             L420,110 L420,90 L440,90 L440,70 L460,70 L460,50 L475,50 L475,35
             L485,35 L485,50 L500,50 L500,70 L520,70 L520,95 L540,95 L540,115
             L560,115 L560,80 L580,80 L580,55 L595,55 L595,40 L605,40 L605,55
             L620,55 L620,80 L640,80 L640,110 L660,110 L660,130 L680,130 L680,150
             L700,150 L700,130 L720,130 L720,110 L740,110 L740,130 L760,130
             L760,150 L780,150 L780,170 L800,170 L800,200 Z"
          fill="#1a0040" opacity="0.9"/>
    <rect x="118" y="18" width="4" height="2" fill="#ff4060" opacity="0.8"/>
    <rect x="222" y="28" width="4" height="2" fill="#ff4060" opacity="0.6"/>
    <rect x="362" y="43" width="4" height="2" fill="#ff4060" opacity="0.9"/>
    <rect x="473" y="33" width="4" height="2" fill="#ff4060" opacity="0.7"/>
    <rect x="592" y="38" width="4" height="2" fill="#ff4060" opacity="0.85"/>
    <rect x="603" y="38" width="4" height="2" fill="#4060ff" opacity="0.7"/>
    <line x1="0" y1="155" x2="800" y2="155" stroke="#3a0080" stroke-width="0.5" opacity="0.5"/>
  </svg>

  <div class="content">

    <div class="brand-tag">SONY × NIGHT CITY EDITION</div>
    <div class="product-title">WH-<span>X</span>1000MX <span>VII</span></div>
    <div class="tagline">// FEEL EVERYTHING. LOSE NOTHING.</div>

    <div class="scene-wrapper" id="sceneWrapper">
      <div class="scene-glow"></div>

      <div class="product-glow-ring"
           style="width:200px;height:200px;top:50%;left:50%;animation-delay:0s;"></div>
      <div class="product-glow-ring"
           style="width:280px;height:280px;top:50%;left:50%;animation-delay:1.5s;"></div>

      <!-- ✅ UPDATED: using .jpg filenames with no spaces -->
      <div class="img-carousel" id="imgCarousel">
        <img src="sony-headphones-1.png" alt="Sony Headphones View 1" class="active"/>
        <img src="sony-headphones-2.png" alt="Sony Headphones View 2"/>
        <img src="sony-headphones-3.png" alt="Sony Headphones View 3"/>
        <div class="carousel-dots" id="carouselDots">
          <div class="carousel-dot active" data-idx="0"></div>
          <div class="carousel-dot"        data-idx="1"></div>
          <div class="carousel-dot"        data-idx="2"></div>
        </div>
      </div>

    </div>

    <div class="emotion-badge">// MEMORY FRAGMENT ACTIVE</div>

    <div class="quote-block">
      <div class="quote-text">
        "<span class="highlight">I'll go to the moon.</span>
        I'll be waiting for you there, David."
      </div>
    </div>

    <div class="color-dots" id="colorDots">
      <div class="cdot active" style="background:#1a0040;" title="Void Black"></div>
      <div class="cdot"        style="background:#0a0a2a;" title="Deep Space"></div>
      <div class="cdot"        style="background:#2a0060;" title="Night City Purple"></div>
      <div class="cdot"        style="background:#001a40;" title="Midnight Blue"></div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val">40H</div>
        <div class="stat-label">BATTERY</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">-40dB</div>
        <div class="stat-label">ANC DEPTH</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">360°</div>
        <div class="stat-label">SPATIAL</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary">JACK IN</button>
      <button class="btn-secondary">EXPLORE</button>
    </div>

    <div class="data-strip" id="dataStrip">
      SYS.LINK ---- CODEC: PHANTOM-7 ---- NC_EDITION_001 ---- LUCY.OS v2.4.7
    </div>

  </div>

  <script>

    /* 1. STARS */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 0.5;
      s.style.cssText = `
        width:  ${size}px; height: ${size}px;
        top:    ${Math.random() * 100}%;
        left:   ${Math.random() * 100}%;
        animation-delay:    ${Math.random() * 4}s;
        animation-duration: ${2 + Math.random() * 3}s;
      `;
      starsEl.appendChild(s);
    }

    /* 2. MEMORY PARTICLES */
    const wrapper = document.getElementById('sceneWrapper');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'memory-particle';
      const angle = Math.random() * 360;
      const dist  = 60 + Math.random() * 80;
      const dx    = Math.cos(angle * Math.PI / 180) * dist + 'px';
      const dy    = (Math.sin(angle * Math.PI / 180) * dist - 30) + 'px';
      p.style.cssText = `
        left: ${130 + Math.random() * 40}px;
        top:  ${130 + Math.random() * 40}px;
        --dx: ${dx}; --dy: ${dy};
        animation-duration: ${2 + Math.random() * 3}s;
        animation-delay:    ${Math.random() * 3}s;
      `;
      wrapper.appendChild(p);
    }

    /* 3. COLOR PICKER */
    document.querySelectorAll('.cdot').forEach(dot => {
      dot.addEventListener('click', function () {
        document.querySelectorAll('.cdot').forEach(d => d.classList.remove('active'));
        this.classList.add('active');
        document.body.style.background = this.style.background;
      });
    });

    /* 4. DATA TICKER */
    const strips = [
      'SYS.LINK ---- CODEC: PHANTOM-7 ---- NC_EDITION_001 ---- LUCY.OS v2.4.7',
      'NEURAL LINK: ACTIVE ---- BIOMETRIC: STABLE ---- CHROME: 98.2% ---- SHARD: LOADED',
      'AUDIO ENGINE: PHANTOM-DSP ---- LATENCY: 0.3ms ---- CHANNELS: 360° ---- ANC: MAX',
      '> PLAYING: DAVID_S_THEME.ogg ---- MEMORY_FRAGMENT_07 ---- MOON_DIST: 384,400km'
    ];
    let stripIndex = 0;
    const dataStrip = document.getElementById('dataStrip');
    setInterval(() => {
      stripIndex = (stripIndex + 1) % strips.length;
      dataStrip.style.opacity = '0';
      setTimeout(() => {
        dataStrip.textContent = strips[stripIndex];
        dataStrip.style.opacity = '1';
      }, 400);
    }, 3000);

    /* 5. IMAGE CAROUSEL */
    const carouselImgs = document.querySelectorAll('.img-carousel img');
    const carouselDots = document.querySelectorAll('.carousel-dot');
    let carouselIdx = 0;

    function goToSlide(idx) {
      carouselImgs[carouselIdx].classList.remove('active');
      carouselDots[carouselIdx].classList.remove('active');
      carouselIdx = idx;
      carouselImgs[carouselIdx].classList.add('active');
      carouselDots[carouselIdx].classList.add('active');
    }

    carouselDots.forEach(dot => {
      dot.addEventListener('click', () => goToSlide(parseInt(dot.dataset.idx)));
    });

    setInterval(() => {
      goToSlide((carouselIdx + 1) % carouselImgs.length);
    }, 3500);

  </script>

</body>
</html>
